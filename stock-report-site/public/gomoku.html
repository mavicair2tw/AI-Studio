<script>
const canvas = document.getElementById('board');
const ctx = canvas.getContext('2d');
const statusEl = document.getElementById('status');
const restartBtn = document.getElementById('restartBtn');
const undoBtn = document.getElementById('undoBtn');

const size = 15; // 15x15
const padding = 32;
const boardPixels = canvas.width;
const cell = (boardPixels - padding * 2) / (size - 1);

let board = [];
let currentPlayer = 1; // 1 = 黑, 2 = 白
let gameOver = false;
let moves = [];
let lastMove = null;

init();

function init() {
board = Array.from({ length: size }, () => Array(size).fill(0));
currentPlayer = 1;
gameOver = false;
moves = [];
lastMove = null;
updateStatus();
draw();
}

function updateStatus(text) {
if (text) {
statusEl.textContent = text;
return;
}
if (gameOver) return;
statusEl.textContent = `目前回合：${currentPlayer === 1 ? '黑子' : '白子'}`;
}

function draw() {
// 清空
ctx.clearRect(0, 0, canvas.width, canvas.height);

// 棋盤底色（canvas自己的漸層）
// 畫格線
ctx.strokeStyle = '#7a5425';
ctx.lineWidth = 1;

for (let i = 0; i < size; i++) {
const p = padding + i * cell;

// 橫線
ctx.beginPath();
ctx.moveTo(padding, p);
ctx.lineTo(boardPixels - padding, p);
ctx.stroke();

// 直線
ctx.beginPath();
ctx.moveTo(p, padding);
ctx.lineTo(p, boardPixels - padding);
ctx.stroke();
}

// 星位 (15路常見)
const stars = [3, 7, 11];
for (const r of stars) {
for (const c of stars) {
drawStar(r, c);
}
}

// 棋子
for (let r = 0; r < size; r++) {
for (let c = 0; c < size; c++) {
if (board[r][c] !== 0) {
drawStone(r, c, board[r][c]);
}
}
}

// 最後一步標記
if (lastMove) {
const { r, c } = lastMove;
const x = padding + c * cell;
const y = padding + r * cell;
ctx.beginPath();
ctx.fillStyle = '#ff5f5f';
ctx.arc(x, y, 4.5, 0, Math.PI * 2);
ctx.fill();
}
}

function drawStar(r, c) {
const x = padding + c * cell;
const y = padding + r * cell;
ctx.beginPath();
ctx.fillStyle = 'rgba(60,35,10,0.8)';
ctx.arc(x, y, 3, 0, Math.PI * 2);
ctx.fill();
}

function drawStone(r, c, player) {
const x = padding + c * cell;
const y = padding + r * cell;
const radius = cell * 0.42;

const g = ctx.createRadialGradient(
x - radius * 0.35, y - radius * 0.35, radius * 0.2,
x, y, radius
);

if (player === 1) {
g.addColorStop(0, '#666');
g.addColorStop(0.35, '#222');
g.addColorStop(1, '#000');
} else {
g.addColorStop(0, '#fff');
g.addColorStop(0.45, '#f0f0f0');
g.addColorStop(1, '#d8d8d8');
}

ctx.beginPath();
ctx.fillStyle = g;
ctx.arc(x, y, radius, 0, Math.PI * 2);
ctx.fill();

ctx.beginPath();
ctx.strokeStyle = 'rgba(0,0,0,0.2)';
ctx.lineWidth = 1;
ctx.arc(x, y, radius, 0, Math.PI * 2);
ctx.stroke();
}

function getNearestIntersection(px, py) {
const c = Math.round((px - padding) / cell);
const r = Math.round((py - padding) / cell);

if (r < 0 || r >= size || c < 0 || c >= size) return null;

const ix = padding + c * cell;
const iy = padding + r * cell;

// 點擊容差
const dist = Math.hypot(px - ix, py - iy);
if (dist > cell * 0.45) return null;

return { r, c };
}

function placeStone(r, c) {
if (gameOver) return;
if (board[r][c] !== 0) return;

board[r][c] = currentPlayer;
moves.push({ r, c, player: currentPlayer });
lastMove = { r, c };

if (checkWin(r, c, currentPlayer)) {
gameOver = true;
draw();
updateStatus(`🎉 ${currentPlayer === 1 ? '黑子' : '白子'}獲勝！`);
return;
}

// 和局（盤滿）
if (moves.length === size * size) {
gameOver = true;
draw();
updateStatus('平手！棋盤已滿。');
return;
}

currentPlayer = currentPlayer === 1 ? 2 : 1;
updateStatus();
draw();
}

function checkWin(r, c, player) {
const dirs = [
[1, 0], // 垂直
[0, 1], // 水平
[1, 1], // 斜 \
[1, -1], // 斜 /
];

for (const [dr, dc] of dirs) {
let count = 1;
count += countDir(r, c, dr, dc, player);
count += countDir(r, c, -dr, -dc, player);
if (count >= 5) return true;
}
return false;
}

function countDir(r, c, dr, dc, player) {
let cnt = 0;
let nr = r + dr;
let nc = c + dc;
while (
nr >= 0 && nr < size &&
nc >= 0 && nc < size &&
board[nr][nc] === player
) {
cnt++;
nr += dr;
nc += dc;
}
return cnt;
}

function onCanvasClick(e) {
if (gameOver) return;

const rect = canvas.getBoundingClientRect();

// 兼容縮放後座標
const scaleX = canvas.width / rect.width;
const scaleY = canvas.height / rect.height;

const x = (e.clientX - rect.left) * scaleX;
const y = (e.clientY - rect.top) * scaleY;

const pos = getNearestIntersection(x, y);
if (!pos) return;

placeStone(pos.r, pos.c);
}

function undo() {
if (moves.length === 0) return;

const last = moves.pop();
board[last.r][last.c] = 0;

gameOver = false;
currentPlayer = last.player; // 回到剛剛下那顆的人
lastMove = moves.length ? { r: moves[moves.length - 1].r, c: moves[moves.length - 1].c } : null;

updateStatus();
draw();
}

canvas.addEventListener('click', onCanvasClick);
restartBtn.addEventListener('click', init);
undoBtn.addEventListener('click', undo);

// 手機觸控支援（可選）
canvas.addEventListener('touchstart', (e) => {
e.preventDefault();
const t = e.changedTouches[0];
onCanvasClick({ clientX: t.clientX, clientY: t.clientY });
}, { passive: false });
</script>
