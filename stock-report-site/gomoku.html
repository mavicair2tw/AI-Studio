<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>五子棋</title>
  <style>
    :root {
      --bg: #f5efe6;
      --panel: rgba(255,255,255,0.7);
      --text: #2b2b2b;
      --wood: #d9b36c;
      --wood-line: #7a5425;
      --accent: #2f6fed;
      --shadow: 0 12px 30px rgba(0,0,0,0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top, #fff8ef 0%, #f4ead8 45%, #eadcc6 100%);
      font-family: "Noto Sans TC", "Microsoft JhengHei", system-ui, sans-serif;
      color: var(--text);
      padding: 24px;
    }

    .wrap {
      width: min(96vw, 900px);
      display: grid;
      grid-template-columns: 1fr 280px;
      gap: 20px;
      align-items: start;
    }

    .board-card, .panel {
      background: var(--panel);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.5);
      border-radius: 24px;
      box-shadow: var(--shadow);
    }

    .board-card {
      padding: 18px;
      display: grid;
      place-items: center;
    }

    canvas {
      width: min(78vw, 640px);
      height: min(78vw, 640px);
      max-width: 640px;
      max-height: 640px;
      border-radius: 18px;
      background: linear-gradient(145deg, #e2bf79, #d4aa63);
      box-shadow: inset 0 2px 8px rgba(255,255,255,0.25), inset 0 -8px 18px rgba(0,0,0,0.08);
      cursor: pointer;
      touch-action: manipulation;
    }

    .panel {
      padding: 18px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }

    .subtitle {
      margin: 0 0 18px;
      opacity: 0.75;
      line-height: 1.6;
      font-size: 14px;
    }

    .status {
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(255,255,255,0.75);
      margin-bottom: 14px;
      line-height: 1.6;
      font-weight: 700;
    }

    .row {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 12px 16px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
      box-shadow: 0 8px 16px rgba(0,0,0,0.08);
    }

    button:hover { transform: translateY(-1px); }
    button:active { transform: translateY(1px) scale(0.99); }

    .primary {
      background: var(--accent);
      color: white;
    }

    .secondary {
      background: white;
      color: var(--text);
    }

    .info {
      margin-top: 14px;
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(255,255,255,0.55);
      font-size: 14px;
      line-height: 1.8;
    }

    .legend {
      display: grid;
      gap: 10px;
      margin-top: 14px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
    }

    .dot {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      display: inline-block;
      border: 1px solid rgba(0,0,0,0.15);
    }

    .black { background: #111; }
    .white { background: #f7f7f7; }
    .last { background: #ff5f5f; }

    @media (max-width: 860px) {
      .wrap {
        grid-template-columns: 1fr;
      }

      .panel {
        order: -1;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="board-card">
      <canvas id="board" width="640" height="640" aria-label="五子棋棋盤"></canvas>
    </div>

    <aside class="panel">
      <h1>五子棋</h1>
      <p class="subtitle">黑子先手。先連成 5 顆就直接封神，沒有加班賽。</p>

      <div class="status" id="status">目前回合：黑子</div>

      <div class="row">
        <button class="primary" id="restartBtn">重新開始</button>
        <button class="secondary" id="undoBtn">悔棋</button>
      </div>

      <div class="legend">
        <div class="legend-item"><span class="dot black"></span> 黑子</div>
        <div class="legend-item"><span class="dot white"></span> 白子</div>
        <div class="legend-item"><span class="dot last"></span> 最後一步標記</div>
      </div>

      <div class="info">
        規則：<br>
        1. 點擊交叉點落子。<br>
        2. 黑白輪流下。<br>
        3. 任一方向連成五子即獲勝。<br>
        4. 悔棋一次會退回上一步，失誤了也還有台階下。
      </div>
    </aside>
  </div>

  <script>
    const canvas = document.getElementById('board');
    const ctx = canvas.getContext('2d');
    const statusEl = document.getElementById('status');
    const restartBtn = document.getElementById('restartBtn');
    const undoBtn = document.getElementById('undoBtn');

    const size = 15;
    const padding = 32;
    const boardPixels = canvas.width;
    const cell = (boardPixels - padding * 2) / (size - 1);

    let board = [];
    let currentPlayer = 1; // 1 黑, 2 白
    let gameOver = false;
    let moves = [];
    let lastMove = null;

    function initGame() {
      board = Array.from({ length: size }, () => Array(size).fill(0));
      currentPlayer = 1;
      gameOver = false;
      moves = [];
      lastMove = null;
      updateStatus();
      drawBoard();
    }

    function updateStatus(message) {
      if (message) {
        statusEl.textContent = message;
        return;
      }
      statusEl.textContent = gameOver
        ? statusEl.textContent
        : `目前回合：${currentPlayer === 1 ? '黑子' : '白子'}`;
    }

    function drawBoard() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // 木紋底色細節
      for (let i = 0; i < 8; i++) {
        ctx.beginPath();
        ctx.strokeStyle = `rgba(255,255,255,${0.05 + i * 0.01})`;
        ctx.lineWidth = 1;
        ctx.moveTo(0, 30 + i * 75);
        ctx.bezierCurveTo(180, 10 + i * 72, 420, 60 + i * 79, 640, 35 + i * 77);
        ctx.stroke();
      }

      // 格線
      ctx.strokeStyle = '#7a5425';
      ctx.lineWidth = 1;
      for (let i = 0; i < size; i++) {
        const pos = padding + i * cell;

        ctx.beginPath();
        ctx.moveTo(padding, pos);
        ctx.lineTo(boardPixels - padding, pos);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(pos, padding);
        ctx.lineTo(pos, boardPixels - padding);
        ctx.stroke();
      }

      // 星位
      const stars = [3, 7, 11];
      ctx.fillStyle = '#5f3e18';
      for (const r of stars) {
        for (const c of stars) {
          ctx.beginPath();
          ctx.arc(padding + c * cell, padding + r * cell, 4, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      // 棋子
      for (let row = 0; row < size; row++) {
        for (let col = 0; col < size; col++) {
          if (board[row][col] !== 0) {
            drawStone(row, col, board[row][col]);
          }
        }
      }

      if (lastMove) {
        const { row, col } = lastMove;
        const x = padding + col * cell;
        const y = padding + row * cell;
        ctx.beginPath();
        ctx.fillStyle = '#ff4d4f';
        ctx.arc(x, y, 4, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function drawStone(row, col, player) {
      const x = padding + col * cell;
      const y = padding + row * cell;
      const radius = cell * 0.42;

      const gradient = ctx.createRadialGradient(
        x - radius * 0.35,
        y - radius * 0.35,
        radius * 0.15,
        x,
        y,
        radius
      );

      if (player === 1) {
        gradient.addColorStop(0, '#666');
        gradient.addColorStop(0.25, '#2b2b2b');
        gradient.addColorStop(1, '#000');
      } else {
        gradient.addColorStop(0, '#ffffff');
        gradient.addColorStop(0.5, '#f0f0f0');
        gradient.addColorStop(1, '#cfcfcf');
      }

      ctx.beginPath();
      ctx.fillStyle = gradient;
      ctx.arc(x, y, radius, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = player === 1 ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.15)';
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    function getBoardPosition(clientX, clientY) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      const x = (clientX - rect.left) * scaleX;
      const y = (clientY - rect.top) * scaleY;

      const col = Math.round((x - padding) / cell);
      const row = Math.round((y - padding) / cell);

      if (row < 0 || row >= size || col < 0 || col >= size) return null;

      const snapX = padding + col * cell;
      const snapY = padding + row * cell;
      const dist = Math.hypot(x - snapX, y - snapY);

      if (dist > cell * 0.45) return null;

      return { row, col };
    }

    function placeStone(row, col) {
      if (gameOver || board[row][col] !== 0) return;

      board[row][col] = currentPlayer;
      moves.push({ row, col, player: currentPlayer });
      lastMove = { row, col };

      if (checkWin(row, col, currentPlayer)) {
        drawBoard();
        gameOver = true;
        statusEl.textContent = `${currentPlayer === 1 ? '黑子' : '白子'}獲勝！這波操作很乾淨。`;
        return;
      }

      if (moves.length === size * size) {
        drawBoard();
        gameOver = true;
        statusEl.textContent = '平手！棋盤已滿，雙方都很會下。';
        return;
      }

      currentPlayer = currentPlayer === 1 ? 2 : 1;
      updateStatus();
      drawBoard();
    }

    function countDirection(row, col, dx, dy, player) {
      let count = 0;
      let r = row + dx;
      let c = col + dy;
      while (r >= 0 && r < size && c >= 0 && c < size && board[r][c] === player) {
        count++;
        r += dx;
        c += dy;
      }
      return count;
    }

    function checkWin(row, col, player) {
      const directions = [
        [1, 0],
        [0, 1],
        [1, 1],
        [1, -1]
      ];

      return directions.some(([dx, dy]) => {
        const total = 1
          + countDirection(row, col, dx, dy, player)
          + countDirection(row, col, -dx, -dy, player);
        return total >= 5;
      });
    }

    canvas.addEventListener('click', (e) => {
      const pos = getBoardPosition(e.clientX, e.clientY);
      if (!pos) return;
      placeStone(pos.row, pos.col);
    });

    canvas.addEventListener('touchstart', (e) => {
      const touch = e.touches[0];
      if (!touch) return;
      const pos = getBoardPosition(touch.clientX, touch.clientY);
      if (!pos) return;
      placeStone(pos.row, pos.col);
      e.preventDefault();
    }, { passive: false });

    restartBtn.addEventListener('click', initGame);

    undoBtn.addEventListener('click', () => {
      if (moves.length === 0) return;
      const last = moves.pop();
      board[last.row][last.col] = 0;
      currentPlayer = last.player;
      gameOver = false;
      lastMove = moves.length ? { row: moves[moves.length - 1].row, col: moves[moves.length - 1].col } : null;
      updateStatus();
      drawBoard();
    });

    initGame();
  </script>
</body>
</html>
